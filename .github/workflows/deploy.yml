name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: team_WvzTZKj8ipBMBQw3nnQE6Vom
  VERCEL_PROJECT_ID: prj_7IR8uCw2AwlTLYyGPVHVHrSLSBQu

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove local Vercel config (forces use of env vars)
        run: rm -rf .vercel
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
